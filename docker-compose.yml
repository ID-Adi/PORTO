networks:
  default:
    name: porto-net
  caddy:
    name: n8n-pawa-net
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-postgres
    restart: unless-stopped
    ports:
      # Bind ke loopback saja supaya database tidak terekspos ke LAN/VPS.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-porto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set in root .env)}
      POSTGRES_DB: ${POSTGRES_DB:-porto_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-porto} -d ${POSTGRES_DB:-porto_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: porto-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - caddy
    env_file:
      - ./backend/.env
    environment:
      # Inside the container, postgres is reachable via the compose service
      # name on port 5432 (not the host-published 5433).
      # Use container_name (porto-postgres) not service name (postgres) to avoid
      # DNS collision with n8n-pawa-postgres which is aliased as "postgres" on
      # the n8n-pawa-net network that this backend also joins.
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL required (set in root .env, e.g. postgresql://porto:PASS@porto-postgres:5432/porto_db)}
      NODE_ENV: production

volumes:
  postgres_data:
