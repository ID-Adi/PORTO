networks:
  default:
    name: porto-net
  caddy:
    name: n8n-pawa-net
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: porto
      POSTGRES_PASSWORD: porto_secret
      POSTGRES_DB: porto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porto -d porto_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: porto-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - caddy
    env_file:
      - ./backend/.env
    environment:
      # Inside the container, postgres is reachable via the compose service
      # name on port 5432 (not the host-published 5433).
      # Use container_name (porto-postgres) not service name (postgres) to avoid
      # DNS collision with n8n-pawa-postgres which is aliased as "postgres" on
      # the n8n-pawa-net network that this backend also joins.
      DATABASE_URL: postgresql://porto:porto_secret@porto-postgres:5432/porto_db
      NODE_ENV: production

volumes:
  postgres_data:
