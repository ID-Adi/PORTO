services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: porto
      POSTGRES_PASSWORD: porto_secret
      POSTGRES_DB: porto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
