networks:
  default:
    name: porto-net
  caddy:
    name: n8n-pawa-net
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-postgres
    restart: unless-stopped
    ports:
      # Bind ke loopback saja supaya database tidak terekspos ke LAN/VPS.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-porto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set in root .env)}
      POSTGRES_DB: ${POSTGRES_DB:-porto_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-porto} -d ${POSTGRES_DB:-porto_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: porto-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - caddy
    env_file:
      - ./backend/.env
    environment:
      # Inside the container, postgres is reachable via the compose service
      # name on port 5432 (not the host-published 5433).
      # Use container_name (porto-postgres) not service name (postgres) to avoid
      # DNS collision with n8n-pawa-postgres which is aliased as "postgres" on
      # the n8n-pawa-net network that this backend also joins.
      DATABASE_URL: ${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL required (set in root .env, e.g. postgresql://porto:PASS@porto-postgres:5432/porto_db)}
      NODE_ENV: production
    volumes:
      # File dinamis (admin uploads + tools generations) — persisten lintas
      # container restart. Backend serve /uploads/* via Hono serveStatic.
      - porto_uploads:/app/public/uploads

  frontend:
    build:
      # Context = repo root: build butuh source backend untuk type-check
      # import AppRouter (@porto/api). Lihat catatan di frontend/Dockerfile.
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* di-inline saat build, jadi diberikan sebagai build arg.
        # Override lewat root .env bila perlu; default = nilai produksi.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api.pawa.my.id}
        NEXT_PUBLIC_ADMIN_EMAIL: ${NEXT_PUBLIC_ADMIN_EMAIL:-adi@pawa.my.id}
    container_name: porto-frontend
    restart: unless-stopped
    ports:
      # Ingress publik = Cloudflare Tunnel (cloudflared-pawa) → localhost:3001.
      # Publish ke loopback saja (sejajar backend 127.0.0.1:4002); tunnel jalan
      # di host menjangkau via localhost. Tidak terekspos ke LAN/VPS.
      - "127.0.0.1:3001:3000"
    networks:
      # Tetap di n8n-pawa-net agar Caddy bisa menjangkau via porto-frontend:3000
      # bila diperlukan (jalur sekunder, sejajar backend).
      - default
      - caddy
    env_file:
      # Variabel server-side runtime (GITHUB_TOKEN, GITHUB_USERNAME).
      - ./frontend/.env
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
  porto_uploads:
